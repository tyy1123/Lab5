<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人简历</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
        body{background:#f5f7fa;min-height:100vh}
        .resume-container{max-width:1300px;margin:30px auto;background:#fff;padding:30px;border-radius:12px}
        .caption{text-align:center;font-size:32px;margin-bottom:20px}
        .resume{border:2px solid #2c3e50;border-radius:8px}
        .top{display:flex;border-bottom:1px solid #eee}
        .top-left{flex:1}
        .top-right{width:240px;border-left:1px solid #eee;display:flex;align-items:center;justify-content:center}
        .top-right img{width:160px;height:200px;object-fit:cover;border-radius:6px}
        .row{display:flex;border-bottom:1px solid #eee;align-items:center}
        .th{width:160px;background:#3498db;color:#fff;padding:16px;text-align:center}
        .td{width:200px;padding:16px 10px;border-right:1px solid #eee;display:flex;gap:6px;flex-wrap:wrap}
        input[type="radio"]{width:12px;height:12px}
        select,input,textarea{width:100%;height:34px;padding:0 8px;border:1px solid #ddd;border-radius:4px}
        textarea{height:80px}
        .full-td{flex:1;padding:16px 10px}
    </style>
</head>
<body>
<div class="resume-container">  
    <div class="caption">个人简历</div>
    <div class="resume">
        <div class="top">
            <div class="top-left">
                <form>
                    <div class="row">
                        <div class="th">姓名</div>
                        <div class="td"><input type="text"></div>
                        <div class="th">性别</div>
                        <div class="td">
                            <label><input type="radio" name="gender">男</label>
                            <label><input type="radio" name="gender">女</label>
                        </div>
                        <div class="th">年龄</div>
                        <div class="td">
                            <select>
                                <option>请选择</option>
                                <option>18</option>
                                <option>19</option>
                                <option>20</option>
                                <option>21</option>
                                <option>22</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="th">籍贯</div>
                        <div class="td"><input type="text"></div>
                        <div class="th">电话</div>
                        <div class="td"><input type="text"></div>
                        <div class="th">邮箱</div>
                        <div class="td"><input type="text"></div>
                    </div>

                    <div class="row">
                        <div class="th">学历</div>
                        <div class="td">
                            <label><input type="radio" name="edu">高中</label>
                            <label><input type="radio" name="edu">专科</label>
                            <label><input type="radio" name="edu">本科</label>
                        </div>
                        <div class="th">健康</div>
                        <div class="td">
                            <label><input type="radio" name="health">良好</label>
                            <label><input type="radio" name="health">一般</label>
                        </div>
                        <div class="th">婚姻</div>
                        <div class="td">
                            <label><input type="radio" name="marry">未婚</label>
                            <label><input type="radio" name="marry">已婚</label>
                        </div>
                    </div>

                    <div class="row">
                        <div class="th">求职意向</div>
                        <div class="td">
                            <select multiple size="4">
                                <option>前端开发</option>
                                <option>后端开发</option>
                                <option>软件测试</option>
                                <option>会计</option>
                            </select>
                        </div>
                        <div class="th">专业</div>
                        <div class="td">
                            <select>
                                <option>请选择</option>
                                <option>计算机</option>
                                <option>会计</option>
                                <option>汉语言</option>
                            </select>
                        </div>
                        <div class="th">毕业院校</div>
                        <div class="td">
                            <select>
                                <option>请选择学校</option>
                                <option>烟台理工学院</option>
                                <option>烟台大学</option>
                                <option>鲁东大学</option>
                                <option>山东工商学院</option>
                                <option>济南大学</option>
                                <option>青岛大学</option>
                                <option>山东理工大学</option>
                                <option>潍坊学院</option>
                                <option>济宁学院</option>
                                <option>其他院校</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="top-right">
                <input type="file" accept="image/*">
            </div>
        </div>

        <div class="row">
            <div class="th">技能证书</div>
            <div class="full-td"><textarea></textarea></div>
        </div>
        <div class="row">
            <div class="th">特长爱好</div>
            <div class="full-td"><textarea></textarea></div>
        </div>
        <div class="row">
            <div class="th">项目经历</div>
            <div class="full-td"><textarea></textarea></div>
        </div>
        <div class="row">
            <div class="th">自我评价</div>
            <div class="full-td"><textarea></textarea></div>
        </div>
    </div>
</div>
</body>
</html>
